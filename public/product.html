<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuotepassi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page" id="app">
  <p class="msg msg--mute">Ladataan...</p>
</div>
<script>
async function main() {
  const match = location.pathname.match(/^\/p\/([^/]+)\/?$/);
  const slug = match ? match[1] : '';
  const app = document.getElementById('app');
  if (!slug) {
    app.innerHTML = '<p class="msg msg--err">Virheellinen tuotelinkki.</p>';
    return;
  }
  let res;
  try { res = await fetch(`/api/public/product/${encodeURIComponent(slug)}`); }
  catch { app.innerHTML = '<p class="msg msg--err">Virhe yhteydessä.</p>'; return; }
  if (!res.ok) { app.innerHTML = '<p class="msg msg--err">Tuotetta ei löytynyt.</p>'; return; }
  const p = await res.json();
  document.title = (p.product_name || 'Tuotepassi') + ' – Digitaalinen tuotepassi';
  render(app, p);
}

function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseList(json) {
  try { const v = JSON.parse(json || '[]'); return Array.isArray(v) ? v : []; }
  catch { return []; }
}

function getTranslation(p) {
  let trans = {};
  try { trans = JSON.parse(p.translations_json || '{}'); } catch {}
  const lang = (navigator.language || '').split('-')[0].toLowerCase();
  return trans[lang] || {};
}

function tv(p, trans, key) {
  const v = trans[key];
  return (v !== undefined && v !== '') ? v : (p[key] ?? '');
}

function tlist(p, trans, jsonKey, transKey) {
  if (Array.isArray(trans[transKey]) && trans[transKey].length > 0) return trans[transKey];
  return parseList(p[jsonKey]);
}

function formatDate(str) {
  if (!str) return '';
  try {
    const d = new Date(str.includes('T') ? str : str.replace(' ', 'T') + 'Z');
    return d.toLocaleDateString('fi-FI', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return str; }
}

function dataRow(lbl, val) {
  const empty = !val || val === 'null' || val === '-';
  return `<div class="data-row">
    <span class="data-lbl">${esc(lbl)}</span>
    <span class="data-val${empty ? ' data-val--empty' : ''}">${esc(empty ? '—' : val)}</span>
  </div>`;
}

function section(title, body) {
  if (!body.trim()) return '';
  return `<div class="section"><div class="section-head">${esc(title)}</div><div>${body}</div></div>`;
}

function listSection(title, items) {
  if (!items.length) return '';
  return section(title,
    `<ul class="data-list">${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`);
}

function render(app, p) {
  const tr = getTranslation(p);
  const name    = tv(p, tr, 'product_name');
  const brand   = tv(p, tr, 'brand_name');
  const mfrName = tv(p, tr, 'manufacturer_name') || p.manufacturer_name || '';
  const mfrMail = p.manufacturer_email || '';
  const mfrAddr = p.manufacturer_address || '';

  const materials = tlist(p, tr, 'materials_json',              'materials');
  const care      = tlist(p, tr, 'care_instructions_json',      'care_instructions');
  const repair    = tlist(p, tr, 'repair_instructions_json',    'repair_instructions');
  const recycling = tlist(p, tr, 'recycling_instructions_json', 'recycling_instructions');
  const safety    = tlist(p, tr, 'safety_notes_json',           'safety_notes');

  const mfrSection = (mfrName || mfrMail || mfrAddr)
    ? section('Valmistaja',
        (mfrName ? dataRow('Nimi', mfrName) : '') +
        (mfrMail ? dataRow('Sähköposti', mfrMail) : '') +
        (mfrAddr ? dataRow('Osoite', mfrAddr) : ''))
    : '';

  app.innerHTML = `
    <div class="system-badge">EU · Digitaalinen tuotepassi</div>

    <div class="pp-header">
      <h1 class="pp-name">${esc(name)}</h1>
      ${brand ? `<p class="pp-brand">${esc(brand)}</p>` : ''}
    </div>

    ${mfrSection}
    ${listSection('Materiaalit', materials)}
    ${listSection('Hoito-ohjeet', care)}
    ${listSection('Korjausohjeet', repair)}
    ${listSection('Kierrätysohjeet', recycling)}
    ${listSection('Turvallisuustiedot', safety)}

    <div class="pp-footer">
      <div class="pp-footer-item">
        <span class="f-lbl">Julkaistu</span>
        <span class="f-val">${esc(formatDate(p.published_at || p.updated_at || p.created_at))}</span>
      </div>
      <div class="pp-footer-item">
        <span class="f-lbl">Versio</span>
        <span class="f-val">v${esc(String(p.version || 1))}</span>
      </div>
    </div>
  `;
}

main();
</script>
</body>
</html>
