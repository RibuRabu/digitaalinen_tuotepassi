<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuotepassi</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page" id="app">
  <p class="muted">Ladataan tuotetietoja...</p>
</div>
<script>
async function main() {
  const slug = location.pathname.replace(/^\/p\//, '').replace(/\/$/, '');
  const app = document.getElementById('app');
  if (!slug) {
    app.innerHTML = '<p class="error">Tuotetta ei löytynyt.</p>';
    return;
  }
  let res;
  try {
    res = await fetch(`/api/public/product/${encodeURIComponent(slug)}`);
  } catch {
    app.innerHTML = '<p class="error">Virhe yhteydessä.</p>';
    return;
  }
  if (!res.ok) {
    app.innerHTML = '<p class="error">Tuotetta ei löytynyt.</p>';
    return;
  }
  const p = await res.json();
  render(app, p);
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function parseList(json) {
  try {
    const v = JSON.parse(json || '[]');
    return Array.isArray(v) ? v : [];
  } catch {
    return [];
  }
}

function listCard(title, items) {
  if (!items.length) return '';
  return `
    <div class="card">
      <h2>${escapeHtml(title)}</h2>
      <ul class="materials">${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>
    </div>`;
}

function render(app, p) {
  const materials = parseList(p.materials_json);
  const safetyNotes = parseList(p.safety_notes_json);
  const careInstructions = parseList(p.care_instructions_json);
  const repairInstructions = parseList(p.repair_instructions_json);
  const recyclingInstructions = parseList(p.recycling_instructions_json);

  app.innerHTML = `
    <div class="card">
      <span class="badge ${p.status === 'active' ? 'active' : ''}">${escapeHtml(p.status)}</span>
      <h1>${escapeHtml(p.product_name)}</h1>
      <p class="muted">${escapeHtml(p.brand_name || '')}</p>
    </div>

    <div class="card">
      <h2>Valmistaja</h2>
      <p>${escapeHtml(p.manufacturer_name || '-')}</p>
      <p class="muted">${escapeHtml(p.manufacturer_email || '')}</p>
      <p class="muted">${escapeHtml(p.manufacturer_address || '')}</p>
    </div>

    ${listCard('Materiaalit', materials)}
    ${listCard('Hoito-ohjeet', careInstructions)}
    ${listCard('Korjausohjeet', repairInstructions)}
    ${listCard('Kierrätysohjeet', recyclingInstructions)}
    ${listCard('Turvallisuustiedot', safetyNotes)}

    <div class="card">
      <h2>Tuotepassin tunnisteet</h2>
      <p class="muted">Tuotetunniste (UID): ${escapeHtml(p.product_uid)}</p>
      <p class="muted">Passin tunniste: ${escapeHtml(p.passport_uid)}</p>
      <p class="muted">Tunnistetaso: ${escapeHtml(p.identifier_level)}</p>
      <p class="muted">Data carrier: ${escapeHtml(p.data_carrier_type)}</p>
      <p class="muted">Versio: ${escapeHtml(p.version)}</p>
    </div>
  `;
}

main();
</script>
</body>
</html>
