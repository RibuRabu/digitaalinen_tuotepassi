<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuotepassi</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page" id="app">
  <p class="muted">Ladataan tuotetietoja...</p>
</div>
<script>
async function main() {
  const match = location.pathname.match(/^\/p\/([^/]+)\/?$/);
  const slug = match ? match[1] : '';
  const app = document.getElementById('app');
  if (!slug) {
    console.error('Virheellinen tuotelinkki, pathname:', location.pathname);
    app.innerHTML = '<p class="error">Virheellinen tuotelinkki.</p>';
    return;
  }
  let res;
  try {
    res = await fetch(`/api/public/product/${encodeURIComponent(slug)}`);
  } catch {
    app.innerHTML = '<p class="error">Virhe yhteydessä.</p>';
    return;
  }
  if (!res.ok) {
    app.innerHTML = '<p class="error">Tuotetta ei löytynyt.</p>';
    return;
  }
  const p = await res.json();
  render(app, p);
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function parseList(json) {
  try {
    const v = JSON.parse(json || '[]');
    return Array.isArray(v) ? v : [];
  } catch { return []; }
}

function getTranslation(p) {
  let trans = {};
  try { trans = JSON.parse(p.translations_json || '{}'); } catch {}
  const lang = (navigator.language || '').split('-')[0].toLowerCase();
  return trans[lang] || {};
}

function t(p, trans, key) {
  const v = trans[key];
  return (v !== undefined && v !== '') ? v : (p[key] ?? '');
}

function tList(p, trans, jsonKey, transKey) {
  if (Array.isArray(trans[transKey]) && trans[transKey].length > 0) return trans[transKey];
  return parseList(p[jsonKey]);
}

function listCard(title, items) {
  if (!items.length) return '';
  return `
    <div class="card">
      <h2>${escapeHtml(title)}</h2>
      <ul class="materials">${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>
    </div>`;
}

function render(app, p) {
  const trans = getTranslation(p);

  const productName = t(p, trans, 'product_name');
  const brandName = t(p, trans, 'brand_name');
  const manufacturerName = t(p, trans, 'manufacturer_name');
  const manufacturerEmail = t(p, trans, 'manufacturer_email');
  const manufacturerAddress = t(p, trans, 'manufacturer_address');

  const materials = tList(p, trans, 'materials_json', 'materials');
  const safetyNotes = tList(p, trans, 'safety_notes_json', 'safety_notes');
  const careInstructions = tList(p, trans, 'care_instructions_json', 'care_instructions');
  const repairInstructions = tList(p, trans, 'repair_instructions_json', 'repair_instructions');
  const recyclingInstructions = tList(p, trans, 'recycling_instructions_json', 'recycling_instructions');

  app.innerHTML = `
    <div class="card">
      <span class="badge ${p.status === 'active' ? 'active' : ''}">${escapeHtml(p.status)}</span>
      <h1>${escapeHtml(productName)}</h1>
      <p class="muted">${escapeHtml(brandName)}</p>
    </div>

    <div class="card">
      <h2>Valmistaja</h2>
      <p>${escapeHtml(manufacturerName || '-')}</p>
      <p class="muted">${escapeHtml(manufacturerEmail)}</p>
      <p class="muted">${escapeHtml(manufacturerAddress)}</p>
    </div>

    ${listCard('Materiaalit', materials)}
    ${listCard('Hoito-ohjeet', careInstructions)}
    ${listCard('Korjausohjeet', repairInstructions)}
    ${listCard('Kierrätysohjeet', recyclingInstructions)}
    ${listCard('Turvallisuustiedot', safetyNotes)}

    <div class="card">
      <h2>Tuotepassin tunnisteet</h2>
      <p class="muted">Tuotetunniste (UID): ${escapeHtml(p.product_uid)}</p>
      <p class="muted">Passin tunniste: ${escapeHtml(p.passport_uid)}</p>
      <p class="muted">Tunnistetaso: ${escapeHtml(p.identifier_level)}</p>
      <p class="muted">Data carrier: ${escapeHtml(p.data_carrier_type)}</p>
      <p class="muted">Versio: ${escapeHtml(p.version)}</p>
    </div>
  `;
}

main();
</script>
</body>
</html>
