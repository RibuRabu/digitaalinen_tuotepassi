<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hallintapaneeli – Tuotepassi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.publish-banner {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--sp-4); padding: var(--sp-4) var(--sp-5);
  border-radius: var(--r-lg); margin-bottom: var(--sp-6); flex-wrap: wrap;
}
.publish-banner--draft {
  background: var(--c-accent-dim); border: 1px solid var(--c-accent-ring);
}
.publish-banner--draft p { font-size: var(--text-sm); color: var(--c-text-2); margin: 0; }
.publish-banner--live {
  background: var(--c-ok-dim); border: 1px solid var(--c-ok-ring);
}
.publish-banner--live p { font-size: var(--text-sm); color: var(--c-ok); font-weight: var(--fw-medium); margin: 0; }
.publish-banner--live a { color: var(--c-ok); }
.publish-banner--archived {
  background: var(--c-neutral-dim); border: 1px solid var(--c-border);
}
.publish-banner--archived p { font-size: var(--text-sm); color: var(--c-text-3); margin: 0; }
.trans-toggle-btn {
  display: flex; align-items: center; gap: var(--sp-2);
  font-size: var(--text-sm); color: var(--c-text-2);
  background: none; border: 1px solid var(--c-border);
  border-radius: var(--r); padding: .45rem .85rem;
  cursor: pointer; margin-bottom: var(--sp-4);
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.trans-toggle-btn:hover { color: var(--c-text-1); border-color: var(--c-text-2); }
.comp-score { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--fw-semibold); line-height: 1; }
.comp-score--ok  { color: var(--c-ok); }
.comp-score--mid { color: var(--c-warn); }
.comp-list { list-style: none; padding: 0; margin-top: var(--sp-3); display: flex; flex-direction: column; gap: var(--sp-2); }
.comp-list li { font-size: var(--text-sm); color: var(--c-text-2); display: flex; align-items: flex-start; gap: var(--sp-2); line-height: 1.5; }
.comp-list li::before { content: '!'; font-family: var(--font-mono); font-size: .6rem; font-weight: bold; color: var(--c-warn); flex-shrink: 0; background: var(--c-warn-dim); border: 1px solid var(--c-warn-ring); border-radius: 50%; width: 15px; height: 15px; display: inline-flex; align-items: center; justify-content: center; margin-top: .15rem; }
.comp-list--warn li::before { content: '▲'; font-size: .5rem; }
.field-eu-tag {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono); font-size: .65rem; letter-spacing: .04em;
  color: var(--c-warn); background: var(--c-warn-dim); border: 1px solid var(--c-warn-ring);
  border-radius: 999px; padding: .1rem .45rem; margin-left: var(--sp-2); vertical-align: middle;
}
.form-field--required .form-lbl { display: flex; align-items: center; }
</style>
</head>
<body>
<div class="page" id="app">
  <p class="msg msg--mute">Ladataan...</p>
</div>
<script>
const TEXT_FIELDS = [
  ['product_name',                 'Tuotteen nimi',                    'input'],
  ['brand_name',                   'Brändi',                           'input'],
  ['manufacturer_name',            'Valmistaja',                       'input'],
  ['manufacturer_email',           'Valmistajan sähköposti',           'input'],
  ['manufacturer_address',         'Valmistajan osoite',               'textarea'],
  ['responsible_operator_name',    'Vastuullinen toimija',             'input'],
  ['responsible_operator_email',   'Vastuullisen toimijan sähköposti', 'input'],
  ['responsible_operator_address', 'Vastuullisen toimijan osoite',     'textarea'],
  ['product_type',                 'Tuotetyyppi',                      'input'],
  ['sku',                          'SKU (sisäinen tuotekoodi)',         'input'],
  ['gtin',                         'GTIN (viivakoodi)',                'input'],
  ['batch_number',                 'Eränumero',                        'input'],
  ['serial_number',                'Sarjanumero',                      'input'],
];

const LIST_FIELDS = [
  ['materials',             'materials_json',             'Materiaalit'],
  ['substances',            'substances_json',            'Huomioitavat aineet'],
  ['safety_notes',          'safety_notes_json',          'Turvallisuustiedot'],
  ['care_instructions',     'care_instructions_json',     'Hoito-ohjeet'],
  ['repair_instructions',   'repair_instructions_json',   'Korjausohjeet'],
  ['recycling_instructions','recycling_instructions_json','Kierrätysohjeet'],
];

const TRANS_LANGS = [['en','English'],['sv','Svenska'],['de','Deutsch'],['fr','Français'],['et','Eesti'],['lv','Latviešu'],['lt','Lietuvių'],['pl','Polski']];
const TRANS_TEXT  = [['product_name','Tuotteen nimi'],['brand_name','Brändi'],['product_type','Tuotetyyppi']];
const TRANS_LISTS = [['materials','Materiaalit'],['care_instructions','Hoito-ohjeet'],['repair_instructions','Korjausohjeet'],['recycling_instructions','Kierrätysohjeet'],['safety_notes','Turvallisuustiedot']];

let currentToken = '';
let allTranslations = {};
let activeLang = 'en';

function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseList(json) {
  try { const v = JSON.parse(json || '[]'); return Array.isArray(v) ? v : []; }
  catch { return []; }
}

function parseDocs(json) {
  return parseList(json).map(d => typeof d === 'string' ? { name: d, url: '' } : d);
}

function getToken() {
  const m = location.pathname.match(/^\/owner\/([^/]+)\/?$/);
  return m ? m[1] : '';
}

let _qr = null;
async function loadQR() {
  if (_qr) return _qr;
  if (window.QRCode) { _qr = window.QRCode; return _qr; }
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
    s.onload = () => { _qr = window.QRCode; resolve(_qr); };
    s.onerror = () => resolve(null);
    document.head.appendChild(s);
  });
}

function pillHtml(status) {
  const map = { active: ['pill--active','Julkaistu'], archived: ['pill--archived','Arkistoitu'] };
  const [cls, lbl] = map[status] || ['pill--draft','Luonnos'];
  return `<span class="pill ${cls}">${lbl}</span>`;
}

function monoRow(lbl, val, copy) {
  return `<div class="mono-row">
    <span class="mono-lbl">${esc(lbl)}</span>
    <code class="mono-val">${esc(val)}</code>
    ${copy ? `<button class="copy-btn" data-copy="${esc(val)}">⎘</button>` : ''}
  </div>`;
}

function formField(key, label, type, value, hint) {
  const v = esc(value ?? '');
  const input = type === 'textarea'
    ? `<textarea class="form-textarea" id="${key}" name="${key}">${v}</textarea>`
    : `<input class="form-input" id="${key}" name="${key}" value="${v}">`;
  const hintHtml = hint ? `<p class="form-hint">${esc(hint)}</p>` : '';
  return `<div class="form-field"><label class="form-lbl" for="${key}">${esc(label)}</label>${input}${hintHtml}</div>`;
}

let allCategories = [];

async function main() {
  currentToken = getToken();
  const app = document.getElementById('app');
  if (!currentToken) { app.innerHTML = '<p class="msg msg--err">Virheellinen hallintayhteys.</p>'; return; }

  let res;
  try { res = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}`); }
  catch { app.innerHTML = '<p class="msg msg--err">Virhe yhteydessä.</p>'; return; }
  if (!res.ok) { app.innerHTML = '<p class="msg msg--err">Tuotetta ei löytynyt.</p>'; return; }

  const p = await res.json();

  // Load categories in parallel with render (non-blocking)
  fetch('/api/public/categories').then(r => r.ok ? r.json() : { categories: [] })
    .then(data => {
      allCategories = data.categories || [];
      renderCategorySelect(p.category_id);
    }).catch(() => {});

  renderAll(app, p);
}

function renderAll(app, p) {
  const publicUrl = `${location.origin}/p/${encodeURIComponent(p.public_slug)}`;
  const docs = parseDocs(p.compliance_documents_json);

  const textFieldsHtml = TEXT_FIELDS.map(([k, l, t]) => {
    const hints = {
      gtin: 'Löydät tämän tuotteen viivakoodista. Jätä tyhjäksi jos GTIN ei ole käytössä.',
      sku: 'Sisäinen tuotetunnus omaan järjestelmääsi. Ei näy julkisella passilla.',
      batch_number: 'Täytä jos tuotteeseesi liittyy erä- tai tuotantoeränumero.',
      serial_number: 'Täytä jos jokaisella tuotteella on oma sarjanumero.',
    };
    return formField(k, l, t, p[k], hints[k]);
  }).join('');

  const listPlaceholders = {
    materials:              'esim. 100% puuvilla, polyesteri, kierrätetty nailon',
    substances:             'esim. ei sisällä SVHC-aineita, ei formaldehydiä',
    safety_notes:           'esim. Pidä poissa lasten ulottuvilta, Ei sovi alle 3-vuotiaille',
    care_instructions:      'esim. Pese 30°C, Älä kuivaa rumpukuivaimessa, Silitä matalalla lämmöllä',
    repair_instructions:    'esim. Vie valtuutettuun korjaamoon, Varaosat saatavilla valmistajalta',
    recycling_instructions: 'esim. Vie tekstiilinkeräykseen, Poista metalliset osat ennen kierrätystä',
  };
  const listFieldsHtml = LIST_FIELDS.map(([k, jk, l]) => {
    const val = parseList(p[jk]).join(', ');
    const el = document.createElement('div');
    el.className = 'form-field';
    el.innerHTML = `<label class="form-lbl" for="${k}">${esc(l)} <span style="font-weight:400;color:var(--c-text-3)">(pilkulla eroteltuna)</span></label>`
      + `<input class="form-input" id="${k}" name="${k}" value="${esc(val)}" placeholder="${esc(listPlaceholders[k] || '')}">`;
    return el.outerHTML;
  }).join('');

  const docsHtml = docs.length
    ? docs.map(d => `<div class="doc-item" data-doc-id="${esc(d.id || '')}">
        <span class="doc-name">${esc(d.name)}</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          ${d.url ? `<a href="${esc(d.url)}" target="_blank" rel="noopener" class="btn-link">Avaa ↗</a>` : ''}
          ${d.id ? `<button type="button" class="btn-link doc-del-btn" style="color:var(--c-err)" data-doc-id="${esc(d.id)}">Poista</button>` : ''}
        </div>
      </div>`).join('')
    : '<div class="empty-state">Ei asiakirjoja.</div>';

  const transLangOpts = TRANS_LANGS.map(([c, l]) => `<option value="${c}">${l}</option>`).join('');
  const transTextHtml = TRANS_TEXT.map(([k, l]) =>
    `<div class="form-field"><label class="form-lbl" for="tr_${k}">${esc(l)}</label><input class="form-input" id="tr_${k}"></div>`
  ).join('');
  const transListHtml = TRANS_LISTS.map(([k, l]) =>
    `<div class="form-field"><label class="form-lbl" for="tr_${k}">${esc(l)} (yksi per rivi)</label><textarea class="form-textarea" id="tr_${k}" style="min-height:3.5rem"></textarea></div>`
  ).join('');

  // Publish banner: shows context-sensitive action at the top
  const publishBannerHtml = p.status === 'draft'
    ? `<div class="publish-banner publish-banner--draft">
        <p>Passisi on <strong>luonnos</strong> — ei vielä julkinen. Täytä tiedot ja julkaise kun olet valmis.</p>
        <button type="button" class="btn btn-primary" id="publish-btn">Julkaise passi →</button>
      </div>`
    : p.status === 'active'
    ? `<div class="publish-banner publish-banner--live">
        <p>✓ Passi on <strong>julkinen</strong> — <a href="${esc(publicUrl)}" target="_blank" rel="noopener">avaa julkinen näkymä ↗</a></p>
      </div>`
    : `<div class="publish-banner publish-banner--archived">
        <p>Passi on arkistoitu — ei julkinen.</p>
      </div>`;

  app.innerHTML = `
    <div class="sys-header">
      <div>
        <h1>${esc(p.product_name || 'Tuote')}</h1>
        <span class="sys-sub">${esc(p.product_uid)}</span>
      </div>
      <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
        ${pillHtml(p.status)}
        <span class="sys-sub">v${esc(String(p.version))}</span>
      </div>
    </div>

    ${publishBannerHtml}

    <div class="section">
      <div class="section-head">Tunnisteet ja QR-koodi</div>
      ${monoRow('Julkinen linkki', publicUrl, true)}
      ${monoRow('Tuote-UID', p.product_uid, true)}
      <div class="qr-block">
        <canvas id="qr-canvas"></canvas>
        <div class="qr-meta">
          <span class="qr-label">${esc(publicUrl)}</span>
          <button type="button" class="btn btn-secondary" id="qr-dl" style="margin-top:.25rem">Lataa QR PNG</button>
        </div>
      </div>
    </div>

    <div id="compliance-panel"></div>

    <form id="edit-form">
      <div class="form-section">
        <div class="form-section-head">Julkaisutila</div>
        <div class="form-field">
          <label class="form-lbl" for="status">Tila</label>
          <select class="form-select" id="status" name="status">
            <option value="draft">Luonnos</option>
            <option value="active">Julkaistu</option>
            <option value="archived">Arkistoitu</option>
          </select>
          <p class="form-hint">Käytä "Julkaise passi" -nappia ylhäällä tai vaihda tila tästä.</p>
        </div>
      </div>

      <div class="form-section" id="category-section">
        <div class="form-section-head">Tuotekategoria</div>
        <div class="form-field">
          <label class="form-lbl" for="category-select">Kategoria</label>
          <select class="form-select" id="category-select">
            <option value="">— Ladataan —</option>
          </select>
          <p class="form-hint">Kategoria määrittää mitkä EU-vaatimukset koskevat tuotettasi.</p>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-head">Perustiedot ja valmistaja</div>
        ${textFieldsHtml}
      </div>

      <div class="form-section">
        <div class="form-section-head">Materiaalit ja ohjeet</div>
        ${listFieldsHtml}
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Tallenna muutokset</button>
        <span class="msg" id="edit-msg"></span>
      </div>
    </form>

    <div class="form-section">
      <div class="form-section-head">Asiakirjat ja tiedostot</div>
      <div id="doc-list">${docsHtml}</div>
      <div class="form-field">
        <label class="form-lbl" for="doc-file">Lisää tiedosto (PDF, kuva – max 10 Mt)</label>
        <input type="file" id="doc-file" accept=".pdf,image/*">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="doc-upload-btn">Lähetä</button>
        <span class="msg" id="doc-msg"></span>
      </div>
    </div>

    <button type="button" class="trans-toggle-btn" id="trans-toggle">▸ Lisää tai muokkaa käännöksiä</button>
    <div id="trans-section" style="display:none">
      <div class="form-section">
        <div class="form-section-head">Käännökset</div>
        <div class="form-field">
          <label class="form-lbl" for="trans-lang">Kieli</label>
          <select class="form-select" id="trans-lang">${transLangOpts}</select>
          <p class="form-hint">Kuluttajan selain valitsee automaattisesti oikean kielen.</p>
        </div>
        ${transTextHtml}
        ${transListHtml}
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="save-trans-btn">Tallenna käännös</button>
          <span class="msg" id="trans-msg"></span>
        </div>
      </div>
    </div>
  `;

  document.getElementById('status').value = p.status || 'draft';

  // QR
  loadQR().then(qr => {
    const c = document.getElementById('qr-canvas');
    if (qr && c) qr.toCanvas(c, publicUrl, { width: 140, margin: 1 }).catch(() => {});
  });

  document.getElementById('qr-dl').addEventListener('click', () => {
    const c = document.getElementById('qr-canvas');
    if (!c) return;
    const a = document.createElement('a');
    a.download = `qr-${p.public_slug}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });

  // Copy buttons
  app.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        btn.textContent = '✓'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⎘'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });

  // Main form
  document.getElementById('edit-form').addEventListener('submit', async ev => {
    ev.preventDefault();
    const msg = document.getElementById('edit-msg');
    setMsg(msg, 'Tallennetaan...', 'mute');
    const catSel = document.getElementById('category-select');
    const payload = {
      status: document.getElementById('status').value,
      category_id: catSel ? (catSel.value || null) : undefined,
    };
    for (const [k] of TEXT_FIELDS) payload[k] = document.getElementById(k).value;
    for (const [k] of LIST_FIELDS) {
      payload[k] = document.getElementById(k).value.split(',').map(s => s.trim()).filter(Boolean);
    }
    try {
      const r = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}`, {
        method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload),
      });
      if (!r.ok) throw new Error();
      const u = await r.json();
      setMsg(msg, `Tallennettu — versio ${u.version}`, 'ok');
      if (u.product_uid) loadCompliance(u.product_uid);
    } catch { setMsg(msg, 'Tallennus epäonnistui.', 'err'); }
  });

  // Publish button
  const publishBtn = document.getElementById('publish-btn');
  if (publishBtn) {
    publishBtn.addEventListener('click', async () => {
      publishBtn.disabled = true;
      publishBtn.textContent = 'Julkaistaan...';
      try {
        const r = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ status: 'active' }),
        });
        if (!r.ok) throw new Error();
        location.reload();
      } catch {
        publishBtn.disabled = false;
        publishBtn.textContent = 'Julkaise passi →';
        setMsg(document.getElementById('edit-msg'), 'Julkaisu epäonnistui.', 'err');
      }
    });
  }

  // Document upload
  document.getElementById('doc-upload-btn').addEventListener('click', async () => {
    const fi = document.getElementById('doc-file');
    const file = fi.files[0];
    const msg = document.getElementById('doc-msg');
    if (!file) { setMsg(msg, 'Valitse tiedosto ensin.', 'err'); return; }
    setMsg(msg, 'Ladataan...', 'mute');
    const fd = new FormData(); fd.append('file', file);
    try {
      const r = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}/document`, { method: 'POST', body: fd });
      if (!r.ok) { const e = await r.json().catch(() => ({})); setMsg(msg, `Virhe: ${e.error || r.status}`, 'err'); return; }
      const doc = await r.json();
      setMsg(msg, 'Tallennettu.', 'ok'); fi.value = '';
      const list = document.getElementById('doc-list');
      const empty = list.querySelector('.empty-state');
      if (empty) empty.remove();
      list.insertAdjacentHTML('beforeend', `<div class="doc-item" data-doc-id="${esc(doc.id || '')}">
        <span class="doc-name">${esc(doc.name)}</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          <a href="${esc(doc.url)}" target="_blank" rel="noopener" class="btn-link">Avaa ↗</a>
          ${doc.id ? `<button type="button" class="btn-link doc-del-btn" style="color:var(--c-err)" data-doc-id="${esc(doc.id)}">Poista</button>` : ''}
        </div>
      </div>`);
    } catch { setMsg(msg, 'Yhteysvirhe.', 'err'); }
  });

  // Document delete (event delegation)
  document.getElementById('doc-list').addEventListener('click', async ev => {
    const btn = ev.target.closest('.doc-del-btn');
    if (!btn) return;
    const docId = btn.dataset.docId;
    if (!docId || !confirm('Poistetaanko tiedosto pysyvästi?')) return;
    btn.disabled = true;
    try {
      const r = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}/document/${encodeURIComponent(docId)}`, { method: 'DELETE' });
      if (!r.ok) throw new Error();
      btn.closest('.doc-item')?.remove();
      if (!document.querySelector('#doc-list .doc-item')) {
        document.getElementById('doc-list').innerHTML = '<div class="empty-state">Ei asiakirjoja.</div>';
      }
    } catch { btn.disabled = false; alert('Poisto epäonnistui.'); }
  });

  // Translations
  try { allTranslations = JSON.parse(p.translations_json || '{}'); } catch { allTranslations = {}; }
  loadLang('en');

  document.getElementById('trans-lang').addEventListener('change', ev => {
    saveLangState(); loadLang(ev.target.value);
  });

  document.getElementById('save-trans-btn').addEventListener('click', async () => {
    saveLangState();
    const msg = document.getElementById('trans-msg');
    setMsg(msg, 'Tallennetaan...', 'mute');
    try {
      const r = await fetch(`/api/owner/product/${encodeURIComponent(currentToken)}`, {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ translations: allTranslations }),
      });
      if (!r.ok) throw new Error();
      const u = await r.json();
      setMsg(msg, `Tallennettu — versio ${u.version}`, 'ok');
      if (u.product_uid) loadCompliance(u.product_uid);
    } catch { setMsg(msg, 'Tallennus epäonnistui.', 'err'); }
  });

  // Translation section toggle
  document.getElementById('trans-toggle').addEventListener('click', () => {
    const section = document.getElementById('trans-section');
    const btn = document.getElementById('trans-toggle');
    const isOpen = section.style.display !== 'none';
    section.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? '▸ Lisää tai muokkaa käännöksiä' : '▾ Piilota käännökset';
  });

  loadCompliance(p.product_uid);
}

function setMsg(el, text, type) {
  el.textContent = text;
  el.className = `msg msg--${type}`;
}

function renderCategorySelect(currentCategoryId) {
  const sel = document.getElementById('category-select');
  if (!sel || !allCategories.length) return;
  const opts = ['<option value="">— Ei kategoriaa —</option>'];
  const parents = allCategories.filter(c => !c.parent_id);
  const children = allCategories.filter(c => c.parent_id);
  const hasChildren = children.length > 0;
  for (const cat of parents) {
    const subs = children.filter(c => c.parent_id === cat.id);
    if (hasChildren && subs.length) {
      opts.push(`<optgroup label="${esc(cat.name_fi)}">`);
      for (const s of subs) {
        opts.push(`<option value="${esc(s.id)}"${s.id === currentCategoryId ? ' selected' : ''}>${esc(s.name_fi)}</option>`);
      }
      opts.push('</optgroup>');
    } else if (!hasChildren || !cat.parent_id) {
      opts.push(`<option value="${esc(cat.id)}"${cat.id === currentCategoryId ? ' selected' : ''}>${esc(cat.name_fi)}</option>`);
    }
  }
  sel.innerHTML = opts.join('');
}

function loadLang(lang) {
  activeLang = lang;
  const t = allTranslations[lang] || {};
  for (const [k] of TRANS_TEXT) { const el = document.getElementById(`tr_${k}`); if (el) el.value = t[k] || ''; }
  for (const [k] of TRANS_LISTS) { const el = document.getElementById(`tr_${k}`); if (el) el.value = Array.isArray(t[k]) ? t[k].join('\n') : ''; }
}

function saveLangState() {
  const t = {};
  for (const [k] of TRANS_TEXT) { const el = document.getElementById(`tr_${k}`); if (el) t[k] = el.value.trim(); }
  for (const [k] of TRANS_LISTS) { const el = document.getElementById(`tr_${k}`); if (el) t[k] = el.value.split('\n').map(s => s.trim()).filter(Boolean); }
  const hasContent = Object.values(t).some(v => Array.isArray(v) ? v.length > 0 : v !== '');
  if (hasContent) allTranslations[activeLang] = t;
  else delete allTranslations[activeLang];
}

async function loadCompliance(productUid) {
  const panel = document.getElementById('compliance-panel');
  if (!panel || !productUid) return;
  try {
    const r = await fetch(`/api/v1/passport/${encodeURIComponent(productUid)}/compliance`);
    if (!r.ok) return;
    const c = await r.json();
    renderCompliancePanel(panel, c);
  } catch { /* non-critical — panel stays empty */ }
}

function renderCompliancePanel(panel, c) {
  const pct = c.score ?? 0;
  const scoreCls = pct >= 80 ? 'ok' : 'mid';
  const statusMsg = c.status === 'complete'
    ? '<span class="msg msg--ok" style="font-size:var(--text-sm)">✓ EU-vaatimustenmukaisuus täydellinen</span>'
    : `<span class="msg msg--err" style="font-size:var(--text-sm)">${c.missing.length} puuttuvaa — täydennä alla olevaan lomakkeeseen</span>`;

  const missingHtml = c.missing.length
    ? `<ul class="comp-list">${c.missing.map(m => `<li>${esc(m.message_fi || m.message_en || m.rule_code)}</li>`).join('')}</ul>`
    : '';
  const warnHtml = c.warnings.length
    ? `<ul class="comp-list comp-list--warn" style="margin-top:var(--sp-2)">${c.warnings.map(w => `<li>${esc(w.message_fi || w.message_en || w.rule_code)}</li>`).join('')}</ul>`
    : '';

  panel.innerHTML = `
    <div class="form-section" style="margin-bottom:var(--sp-4)">
      <div class="form-section-head">Vaatimustenmukaisuus</div>
      <div class="form-field">
        <div style="display:flex;align-items:center;gap:var(--sp-4);flex-wrap:wrap;margin-bottom:${c.missing.length || c.warnings.length ? 'var(--sp-1)' : '0'}">
          <span class="comp-score comp-score--${scoreCls}">${pct}%</span>
          ${statusMsg}
        </div>
        ${missingHtml}${warnHtml}
      </div>
    </div>`;

  // Annotate form fields that are required by compliance rules but currently empty
  const missingFields = new Set((c.missing || []).map(m => m.field).filter(Boolean));
  for (const fieldKey of missingFields) {
    const el = document.getElementById(fieldKey);
    if (!el) continue;
    const fieldDiv = el.closest('.form-field');
    const lbl = fieldDiv?.querySelector('.form-lbl');
    if (!lbl || lbl.querySelector('.field-eu-tag')) continue;
    fieldDiv.classList.add('form-field--required');
    lbl.insertAdjacentHTML('beforeend', '<span class="field-eu-tag">EU-vaatimus</span>');
  }
}

main();
</script>
