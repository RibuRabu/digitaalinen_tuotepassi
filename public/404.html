<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sivua ei löydy – Digitaalinen tuotepassi</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
body { background: var(--c-bg); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
body::before { display: none; }
.page { animation: none; max-width: 480px; text-align: center; padding: var(--sp-12) var(--sp-6); }
.err-code { font-family: var(--font-mono); font-size: 4rem; font-weight: bold; color: var(--c-border); line-height: 1; margin-bottom: var(--sp-4); }
.err-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: var(--fw-semibold); color: var(--c-text-1); margin-bottom: var(--sp-3); }
.err-sub { font-size: var(--text-sm); color: var(--c-text-3); line-height: 1.6; margin-bottom: var(--sp-8); }
.err-links { display: flex; gap: var(--sp-3); justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="page">
  <div class="err-code">404</div>
  <h1 class="err-title">Sivua ei löydy</h1>
  <p class="err-sub">Etsimääsi sivua ei ole tai se on siirretty.</p>
  <div class="err-links">
    <a href="/" class="btn btn-primary">Etusivulle</a>
    <a href="/pricing" class="btn btn-secondary">Hinnat</a>
  </div>
</div>
</body>
</html>
