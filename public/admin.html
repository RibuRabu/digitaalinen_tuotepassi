<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Digitaalinen tuotepassi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page">
  <div class="sys-header">
    <div>
      <h1>Admin</h1>
      <span class="sys-sub">Digitaalinen tuotepassi – hallintapaneeli</span>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-head">Autentikointi</div>
    <div class="form-field">
      <label class="form-lbl" for="admin-secret">ADMIN_SECRET</label>
      <input class="form-input" type="password" id="admin-secret" autocomplete="current-password" placeholder="Bearer-salasana">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" id="auth-btn">Aseta</button>
      <span class="msg" id="auth-msg"></span>
    </div>
  </div>

  <form id="create-form">
    <div class="form-section">
      <div class="form-section-head">Luo uusi tuotepassi</div>
      <div class="form-field">
        <label class="form-lbl" for="product_name">Tuotteen nimi *</label>
        <input class="form-input" id="product_name" name="product_name" required placeholder="esim. Ekologinen villajumpperi">
      </div>
      <div class="form-field">
        <label class="form-lbl" for="brand_name">Brändi</label>
        <input class="form-input" id="brand_name" name="brand_name" placeholder="esim. Luonto Design">
      </div>
      <div class="form-field">
        <label class="form-lbl" for="manufacturer_name">Valmistaja</label>
        <input class="form-input" id="manufacturer_name" name="manufacturer_name" placeholder="esim. Luonto Oy">
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-head">Asiakastiedot (sisäinen)</div>
      <div class="form-field">
        <label class="form-lbl" for="customer_name">Asiakkaan nimi</label>
        <input class="form-input" id="customer_name" name="customer_name" placeholder="esim. Luonto Oy – Matti Meikäläinen">
      </div>
      <div class="form-field">
        <label class="form-lbl" for="customer_email">Asiakkaan sähköposti</label>
        <input class="form-input" type="email" id="customer_email" name="customer_email" placeholder="asiakas@yritys.fi">
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-head">Passin asetukset</div>
      <div class="form-field">
        <label class="form-lbl" for="identifier_level">Tunnistetaso</label>
        <select class="form-select" id="identifier_level" name="identifier_level">
          <option value="model">model – mallikohtainen</option>
          <option value="batch">batch – eräkohtainen</option>
          <option value="item">item – yksilökohtainen</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-lbl" for="data_carrier_type">Data carrier</label>
        <select class="form-select" id="data_carrier_type" name="data_carrier_type">
          <option value="qr">QR-koodi</option>
          <option value="nfc">NFC</option>
          <option value="rfid">RFID</option>
          <option value="barcode">Viivakoodi</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="create-btn">Luo tuotepassi</button>
      <span class="msg" id="create-msg"></span>
    </div>
  </form>

  <div id="results"></div>
</div>
<script>
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getSecret() { return sessionStorage.getItem('dpp_admin_secret') || ''; }

let _qr = null;
async function loadQR() {
  if (_qr) return _qr;
  if (window.QRCode) { _qr = window.QRCode; return _qr; }
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
    s.onload = () => { _qr = window.QRCode; resolve(_qr); };
    s.onerror = () => resolve(null);
    document.head.appendChild(s);
  });
}

function setMsg(el, text, type) { el.textContent = text; el.className = `msg msg--${type}`; }

function linkRow(label, url, openable) {
  const su = esc(url);
  return `<div class="form-field">
    <label class="form-lbl">${esc(label)}</label>
    <div class="link-row">
      <input class="form-input" readonly value="${su}">
      <button type="button" class="btn btn-ghost" data-copy="${su}">⎘</button>
      ${openable ? `<a href="${su}" target="_blank" rel="noopener" class="btn btn-secondary" style="text-decoration:none">↗</a>` : ''}
    </div>
  </div>`;
}

function resultCard(name, data) {
  const origin = location.origin;
  const pub     = `${origin}/p/${data.slug}`;
  const owner   = `${origin}/owner/${data.token}`;
  const passport = `${origin}/api/passport/${encodeURIComponent(data.product_uid)}`;

  return `<div class="form-section result-card" data-pub="${esc(pub)}">
    <div class="form-section-head">Luotu: ${esc(name)}</div>
    ${linkRow('Julkinen passilinkki (QR / NFC)', pub, true)}
    ${linkRow('Owner-hallintayhteys (salainen – tallenna heti)', owner, true)}
    ${linkRow('Koneluettava passi-API', passport, false)}
    <div class="qr-block">
      <canvas class="qr-canvas"></canvas>
      <div class="qr-meta">
        <span class="qr-label">${esc(pub)}</span>
        <button type="button" class="btn btn-secondary qr-dl-btn" style="margin-top:.5rem">Lataa QR PNG</button>
      </div>
    </div>
  </div>`;
}

function main() {
  const stored = getSecret();
  if (stored) {
    document.getElementById('admin-secret').value = stored;
    setMsg(document.getElementById('auth-msg'), 'Salasana asetettu istunnolle.', 'mute');
  }

  document.getElementById('auth-btn').addEventListener('click', () => {
    const val = document.getElementById('admin-secret').value.trim();
    const msg = document.getElementById('auth-msg');
    if (!val) { setMsg(msg, 'Anna salasana ensin.', 'err'); return; }
    sessionStorage.setItem('dpp_admin_secret', val);
    setMsg(msg, 'Asetettu.', 'ok');
  });

  document.getElementById('create-form').addEventListener('submit', async ev => {
    ev.preventDefault();
    const msg = document.getElementById('create-msg');
    const secret = getSecret();
    if (!secret) { setMsg(msg, 'Aseta admin-salasana ensin.', 'err'); return; }

    const btn = document.getElementById('create-btn');
    btn.disabled = true;
    setMsg(msg, 'Luodaan...', 'mute');

    const name = document.getElementById('product_name').value.trim();
    const payload = {
      product_name: name,
      identifier_level: document.getElementById('identifier_level').value,
      data_carrier_type: document.getElementById('data_carrier_type').value,
    };
    const f = (id) => document.getElementById(id).value.trim();
    if (f('brand_name'))      payload.brand_name      = f('brand_name');
    if (f('manufacturer_name')) payload.manufacturer_name = f('manufacturer_name');
    if (f('customer_name'))   payload.customer_name   = f('customer_name');
    if (f('customer_email'))  payload.customer_email  = f('customer_email');

    try {
      const res = await fetch('/api/admin/product/create', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'authorization': `Bearer ${secret}` },
        body: JSON.stringify(payload),
      });
      if (res.status === 401) { setMsg(msg, 'Väärä admin-salasana.', 'err'); return; }
      if (!res.ok) { const e = await res.json().catch(() => ({})); setMsg(msg, `Virhe: ${e.error || res.status}`, 'err'); return; }

      const data = await res.json();
      msg.textContent = '';
      ev.target.reset();

      document.getElementById('results').insertAdjacentHTML('afterbegin', resultCard(name, data));

      const newCard = document.getElementById('results').firstElementChild;
      const canvas  = newCard.querySelector('.qr-canvas');
      const pub     = newCard.dataset.pub;
      const qr = await loadQR();
      if (qr && canvas) qr.toCanvas(canvas, pub, { width: 160, margin: 1 }).catch(() => {});
    } catch { setMsg(msg, 'Yhteysvirhe.', 'err'); }
    finally { btn.disabled = false; }
  });

  // Event delegation: copy + QR download
  document.addEventListener('click', ev => {
    const copyBtn = ev.target.closest('[data-copy]');
    if (copyBtn) {
      navigator.clipboard.writeText(copyBtn.dataset.copy).then(() => {
        const orig = copyBtn.textContent;
        copyBtn.textContent = '✓';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      });
    }
    if (ev.target.classList.contains('qr-dl-btn')) {
      const canvas = ev.target.closest('.qr-block')?.querySelector('.qr-canvas');
      if (canvas) { const a = document.createElement('a'); a.download = 'qr-code.png'; a.href = canvas.toDataURL('image/png'); a.click(); }
    }
  });
}

main();
</script>
</body>
</html>
